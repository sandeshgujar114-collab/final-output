name: Build TV Player APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install SDK components
      run: |
        sdkmanager "platforms;android-28" "build-tools;30.0.3"

    - name: Generate signing key
      run: |
        keytool -genkey -v -keystore app/release-key.jks \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -alias tvplayer \
          -storepass tvplayer123 \
          -keypass tvplayer123 \
          -dname "CN=TV Player, OU=Dev, O=TVPlayer, L=City, ST=State, C=US"

    - name: Download Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://raw.githubusercontent.com/gradle/gradle/v7.5.1/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
        curl -L -o gradle/wrapper/gradle-wrapper.jar \
          https://services.gradle.org/distributions/gradle-7.5.1-bin.zip --output /dev/null && \
        gradle wrapper --gradle-version 7.5.1 2>/dev/null || true
        # Alternative: generate wrapper using installed gradle
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          # Install gradle and generate wrapper
          sudo apt-get install -y gradle 2>/dev/null || true
          gradle wrapper --gradle-version 7.5.1 2>/dev/null || true
        fi

    - name: Setup Gradle Wrapper
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 7.5.1

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Generate Gradle Wrapper JAR
      run: |
        gradle wrapper --gradle-version 7.5.1

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace

    - name: Verify APK size
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found!"
          exit 1
        fi
        SIZE=$(stat -c%s "$APK_PATH")
        SIZE_MB=$((SIZE / 1024 / 1024))
        echo "APK size: $SIZE bytes ($SIZE_MB MB)"
        if [ $SIZE -gt 10485760 ]; then
          echo "ERROR: APK exceeds 10 MB limit!"
          exit 1
        fi
        echo "APK size is within 10 MB limit."

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: TVVideoPlayer-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90
